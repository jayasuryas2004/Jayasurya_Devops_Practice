name: Python Microservice CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'build_cicd_pipeline_23/**'

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7 

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip' # Caches dependencies to speed up the pipeline

      - name: Install Dependencies
        run: |
          cd build_cicd_pipeline_23
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          cd build_cicd_pipeline_23
          python -m pytest tests/

      - name: Security Scan (SAST - Bandit)
        run: |
          cd build_cicd_pipeline_23
          # Fails the pipeline if insecure Python code is found
          bandit -r src/

  build-and-push:
    needs: test-and-scan # Crucial: This ensures it only builds IF tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: aivar-interview-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd build_cicd_pipeline_23
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
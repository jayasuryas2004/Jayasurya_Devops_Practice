apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-app

spec:
  replicas: 5

  selector:
    matchLabels:
      app: stress-app

  template:
    metadata:
      labels:
        app: stress-app

    spec:
      containers:
      - name: stress-app
        image: nginx

        resources:
          requests:
            cpu: "1000m"
          limits:
            cpu: "1000m"
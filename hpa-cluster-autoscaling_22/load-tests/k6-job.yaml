apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
  namespace: autoscale-demo
spec:
  template:
    spec:
      containers:
      - name: k6
        image: grafana/k6:latest
        args: ["run", "--vus", "150", "--duration", "5m", "/scripts/loadtest.js"]
        volumeMounts:
        - name: script
          mountPath: /scripts
      volumes:
      - name: script
        configMap:
          name: k6-script
      restartPolicy: Never

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-demo-app
  namespace: autoscale-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hpa-demo-app
  template:
    metadata:
      labels:
        app: hpa-demo-app
    spec:
      containers:
      - name: hpa-demo-app
        image: k8s.gcr.io/hpa-example
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"